name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            zip \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          cache: true

      - name: Rust format
        run: cargo fmt --check

      - name: Rust check
        run: cargo check

      - name: Rust clippy
        run: cargo clippy -- -D warnings

      - name: Rust tests
        run: cargo test

      - name: Configure Qt
        run: cmake -S qt -B qt/build/release -DCMAKE_BUILD_TYPE=Release

      - name: Build Qt
        run: cmake --build qt/build/release --config Release

      - name: Qt tests
        shell: bash
        run: |
          set +e
          ctest --test-dir qt/build/release --build-config Release --output-on-failure --verbose
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "===== ctest failed (exit $code); re-running app-controller-tests directly for diagnostics ====="
            exe=$(ls "qt/build/release/Release/app-controller-tests.exe" \
                     "qt/build/release/app-controller-tests" 2>/dev/null | head -1)
            echo "binary: $exe"
            # Force Qt diagnostics to stderr (Windows otherwise routes qFatal/
            # qWarning to the debugger, invisible in CI) and run QTest verbose
            # so the last-printed function points at the failure.
            QT_QPA_PLATFORM=offscreen \
              QT_FORCE_STDERR_LOGGING=1 \
              QT_ASSUME_STDERR_HAS_CONSOLE=1 \
              "$exe" -v2 2>&1
            echo "direct exit code: $?"
            echo "===== Testing/Temporary/LastTest.log ====="
            cat qt/build/release/Testing/Temporary/LastTest.log 2>/dev/null || true
            exit 1
          fi

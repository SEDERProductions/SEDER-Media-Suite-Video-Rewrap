name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g., v0.1.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  tag:
    name: Tag version bump
    runs-on: ubuntu-latest
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version to')"
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version and tag
        id: bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"

          if [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            new_patch=$((patch + 1))
            new_tag="v${major}.${minor}.${new_patch}"
          else
            new_tag="v0.1.0"
            major=0; minor=1; new_patch=0
          fi

          echo "release_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "New tag: $new_tag"

          # Update Cargo.toml
          sed -i -E 's/^version = "[^"]+"/version = "'"${major}.${minor}.${new_patch}"'"/' Cargo.toml

          # Update package.json
          sed -i -E 's/"version": "[^"]+"/"version": "'"${major}.${minor}.${new_patch}"'"/' package.json

          git add Cargo.toml package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${new_tag}"
          git tag "$new_tag"
          git push origin main
          git push origin "$new_tag"

  build:
    name: Build ${{ matrix.os }}
    needs: tag
    if: always()
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then tag="${{ needs.tag.outputs.release_tag }}"; fi
          if [ -z "$tag" ]; then tag="${{ github.ref_name }}"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build wget zip \
            libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0

      - name: Install Linux AppImage tooling
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-plugin-qt-x86_64.AppImage /usr/local/bin/linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtmultimedia'
          cache: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build release package
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run package:release 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: build.log
          if-no-files-found: ignore

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [tag, build]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then tag="${{ needs.tag.outputs.release_tag }}"; fi
          if [ -z "$tag" ]; then tag="${{ github.ref_name }}"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          cd artifacts
          > SHA256SUMS.txt
          for f in *.sha256; do
            if [ -f "$f" ]; then
              cat "$f" >> SHA256SUMS.txt
            fi
          done
          for f in *; do
            if [ -f "$f" ] && [ "$f" != "SHA256SUMS.txt" ] && [[ "$f" != *.sha256 ]]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done
          cat SHA256SUMS.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true

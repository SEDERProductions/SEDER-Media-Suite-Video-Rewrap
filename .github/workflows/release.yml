name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g., v0.1.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  tag:
    name: Tag version bump
    runs-on: ubuntu-24.04
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version to')"
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Bump patch version and tag
        id: bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          latest_tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"

          if [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            new_patch=$((patch + 1))
            new_tag="v${major}.${minor}.${new_patch}"
          else
            new_tag="v0.1.0"
            major=0; minor=1; new_patch=0
          fi

          echo "release_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "New tag: $new_tag"

          # Update Cargo.toml
          sed -i -E 's/^version = "[^"]+"/version = "'"${major}.${minor}.${new_patch}"'"/' Cargo.toml

          # Update package.json
          sed -i -E 's/"version": "[^"]+"/"version": "'"${major}.${minor}.${new_patch}"'"/' package.json

          # Update Cargo.lock so package metadata stays consistent with Cargo.toml.
          cargo generate-lockfile

          git add Cargo.toml Cargo.lock package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${new_tag}"
          git tag "$new_tag"
          git push origin HEAD:refs/heads/main
          git push origin "refs/tags/$new_tag"

  build:
    name: Build ${{ matrix.os }}
    needs: tag
    if: always()
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    steps:
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then tag="${{ needs.tag.outputs.release_tag }}"; fi
          if [ -z "$tag" ]; then tag="${{ github.ref_name }}"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build wget zip \
            libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0

      - name: Install Linux AppImage tooling
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-plugin-qt-x86_64.AppImage /usr/local/bin/linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          cache: true

      - name: Configure
        run: cmake -S qt -B qt/build/release -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=dist

      - name: Build
        run: cmake --build qt/build/release --config Release

      - name: Install (deploys Qt runtime) - Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/bin
          $exe = Get-ChildItem -Path qt/build/release -Recurse -Filter seder-video-rewrap.exe | Select-Object -First 1
          Copy-Item $exe.FullName dist/bin/
          cmake --install qt/build/release --config Release

      - name: Install (deploys Qt runtime) - Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/bin
          exe=$(find qt/build/release -name 'seder-video-rewrap*' -type f -not -name '*.pdb' | head -1)
          cp "$exe" dist/bin/
          cmake --install qt/build/release --config Release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "seder-video-rewrap-${{ steps.vars.outputs.tag }}-windows-x64"
          $stage = "release/$name"
          New-Item -ItemType Directory -Force -Path $stage
          Copy-Item -Path dist/* -Destination $stage -Recurse -Force
          Compress-Archive -Path "$stage/*" -DestinationPath "release/$name.zip" -Force

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          app=$(find dist -maxdepth 2 -name '*.app' -type d -print -quit || echo "")
          if [ -n "$app" ]; then
            name="seder-video-rewrap-${{ steps.vars.outputs.tag }}-macos-arm64"
            mkdir -p release
            ditto -c -k --keepParent "$app" "release/$name.zip"
          else
            echo "No .app bundle found"; exit 1
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          name="seder-video-rewrap-${{ steps.vars.outputs.tag }}-linux-x64"
          mkdir -p release
          echo "dist contents:"
          find dist -type f | head -20
          if [ -f /usr/local/bin/linuxdeploy-x86_64.AppImage ]; then
            export APPIMAGE_EXTRACT_AND_RUN=1
            mkdir -p "$name/usr/bin" "$name/usr/share/applications"
            exe=$(find dist -name seder-video-rewrap -type f -print -quit)
            if [ -z "$exe" ]; then echo "No executable found in dist"; exit 1; fi
            cp "$exe" "$name/usr/bin/"
            printf '[Desktop Entry]\nType=Application\nName=SEDER Media Suite Video Rewrap\nExec=seder-video-rewrap\nCategories=AudioVideo;\nTerminal=false\n' \
              > "$name/usr/share/applications/seder-video-rewrap.desktop"
            /usr/local/bin/linuxdeploy-x86_64.AppImage --appdir "$name" \
              --plugin qt --output appimage || true
            appimage=$(find . -maxdepth 1 -name '*.AppImage' -print -quit)
            if [ -n "$appimage" ]; then
              mv "$appimage" "release/$name.AppImage"
            fi
          fi
          if [ ! -f "release/$name.AppImage" ] && [ ! -f "release/$name.zip" ]; then
            cd dist && zip -r "../release/$name.zip" .
          fi

      - name: Generate checksums
        shell: bash
        run: |
          cd release
          for f in *; do
            if [ -f "$f" ] && [ "$f" != "SHA256SUMS.txt" ]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done
          cat SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [tag, build]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then tag="${{ needs.tag.outputs.release_tag }}"; fi
          if [ -z "$tag" ]; then tag="${{ github.ref_name }}"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          cd artifacts
          > SHA256SUMS.txt
          for f in *.sha256; do
            if [ -f "$f" ]; then
              cat "$f" >> SHA256SUMS.txt
            fi
          done
          for f in *; do
            if [ -f "$f" ] && [ "$f" != "SHA256SUMS.txt" ] && [[ "$f" != *.sha256 ]]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done
          cat SHA256SUMS.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
